<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{BOOK_TITLE}} - 电子书推荐</title>
  </head>
  <body>
    <main>
      <h1>{{BOOK_TITLE}}</h1>
      <p>作者：{{BOOK_AUTHOR}}</p>
      <p>分类：{{BOOK_CATEGORY}}</p>
      <img src="{{BOOK_COVER}}" alt="{{BOOK_TITLE}}封面">
      <section>
        <h2>推荐理由</h2>
        <p>{{RECOMMENDATION}}</p>
      </section>
      <section>
        <h2>京东读书简介</h2>
        <p>{{JD_DESCRIPTION}}</p>
      </section>
      <p><a href="{{JD_URL}}">京东读书来源</a></p>
    </main>
  </body>
</html>
